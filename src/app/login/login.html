<div class="min-h-screen flex items-center justify-center bg-linear-to-br from-slate-50 to-slate-100 p-4">


<div class="w-full max-w-md">
  <div class="text-card-foreground relative overflow-hidden border-0 shadow-2xl bg-white/95 backdrop-blur-sm rounded-2xl">
    <div class="absolute top-0 left-0 right-0 h-1 bg-linear-to-r from-slate-200 via-slate-300 to-slate-200"></div>
    <div class="p-8 sm:p-10 md:pt-12 md:pb-10 md:px-10">
      <div class="flex flex-col items-center text-center space-y-6 sm:space-y-8">
        <div class="relative group">
          <div class="absolute inset-0 bg-linear-to-br from-slate-200 to-slate-300 rounded-full blur-xl opacity-30
          group-hover:opacity-40 transition-opacity duration-300"></div>
          <span class="flex shrink-0 overflow-hidden rounded-full relative h-20 w-20 sm:h-24
          sm:w-24 shadow-lg ring-4 ring-white/50 group-hover:shadow-xl transition-all duration-300">
          <img class="aspect-square h-full w-full object-cover" src="https://media.base44.com/images/public/69e6bbc535ec965e1b81287d/cfda36b9e_logo.png" alt="MediKeep logo">

          </span>

        </div>
        <div class="space-y-2 sm:space-y-3">
          <h1 class="text-2xl sm:text-3xl font-bold text-slate-900 tracking-tight">
            Welcome to  MediKeep
          </h1>
          <p class="text-slate-500 text-sm sm:text-base font-medium">Sign in to continue

          </p>

        </div>
        <div class="w-full">
          <div class="space-y-3">
            <button class="w-full flex items-center justify-center gap-3
             bg-white text-slate-700 px-5 py-3.5 rounded-xl border border-slate-200 hover:bg-slate-50
             hover:border-slate-300 hover:shadow-sm transition-all duration-200 font-medium text-[16px] group">
             <div class=" transition-transform duration-200 -ml-4">
              <svg class="h-5 w-5" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4">

                </path>
                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"> </path>
                <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>

              </svg>

             </div>
             <span>Continue with Google</span>

            </button>

          </div>
          <div class="relative my-6">
            <div class="absolute inset-0 flex items-center">
              <div data-orientation="horizontal" role="none" class="shrink-0 h-px w-full bg-slate-200">
                 <div class="relative flex justify-center text-xs uppercase">
                <span class="bg-white px-3 text-slate-400 font-medium tracking-wider">or

                </span>

              </div>

              </div>

            </div>
          </div>
          <form class="space-y-4 sm:space-y-5" action="" (submit)="guardarlogin()" [formGroup]="form">
            <div class="space-y-3 sm:space-y-4">
              <div class="space-y-1.5">
                <label class="peer-disabled:cursor-not-allowed peer-disabled:opacity-70 text-sm
                font-medium text-slate-700" for="email" >Email</label>
                <div class="relative">
                  <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                  stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-mail
                  absolute left-3 top-1/2 transform -translate-y-1/2 h-4 w-4 text-slate-400">
                  <rect width="20" height="16" x="2" y="4" rx="2"></rect>
                  <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"></path>

                  </svg>
                  <input [formControl]="form.controls.email" type="email" class="flex w-full border px-3 py-2 text-base ring-offset-background file:border-0 file:bg-transparent file:text-sm file:font-medium file:text-foreground focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 disabled:cursor-not-allowed disabled:opacity-50 md:text-sm pl-10 h-11 sm:h-12 bg-slate-50/50 border-slate-200
                   focus:border-slate-400 focus:ring-slate-400 rounded-xl placeholder:text-slate-400"
                    placeholder="tu@example.com"
                   >
                   @if(formutilidades.isvalidField(form,'email')){
                    <mat-error>{{formutilidades.getFieldError(form,"email")}} </mat-error>
                   }
                </div>
                <div class="space-y-1.5">
                  <label class="peer-disabled:cursor-not-allowed peer-disabled:opacity-70 text-sm font-medium text-slate-700"
                   for="password">Password</label>
                   <div class="relative">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-lock absolute left-3 top-1/2
                    transform -translate-y-1/2 h-4 w-4 text-slate-400">
                    <rect width="18" height="11" x="3" y="11" rx="2" ry="2"></rect>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>

                    </svg>
                    <input type="password" class="flex w-full border px-3 py-2 text-base ring-offset-background file:border-0 file:bg-transparent file:text-sm file:font-medium file:text-foreground focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 disabled:cursor-not-allowed disabled:opacity-50 md:text-sm pl-10 h-11 sm:h-12 bg-slate-50/50
                     border-slate-200 focus:border-slate-400
                      focus:ring-slate-400 rounded-xl placeholder:text-slate-400"  placeholder="*******" [formControl]="form.controls.password">
                      @if(formutilidades.isvalidField(form,'password')){
                        <mat-error>{{formutilidades.getFieldError(form, "password")}}</mat-error>
                      }
                   </div>

                </div>

              </div>
              <div class="space-y-3">
                <button [disabled]="form.invalid" class="inline-flex items-center justify-center gap-1 whitespace-nowrap text-sm ring-offset-background focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 disabled:pointer-events-none disabled:opacity-50 [&_svg]:pointer-events-none [&_svg]:size-4 [&_svg]:shrink-0 px-3 py-2 w-full h-11 sm:h-12 bg-slate-900
                 hover:bg-slate-800 text-white font-medium shadow-sm rounded-xl transition-all duration-200" > Sign in
                </button>

              </div>

            </div>

          </form>

        </div>

      </div>

    </div>

  </div>

</div>
</div>
