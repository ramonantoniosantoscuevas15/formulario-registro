<main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
<div class="space-y-8">
  <div class="flex items-center justify-between">
    <div class="bg-card rounded-2xl border border-border shadow-sm">
    <div class="flex items-center justify-between p-6 pb-4">
      <h2 class="text-lg font-semibold">Pacientes Recientes</h2>
      <a class="text-sm text-primary hover:underline flex items-center gap-1" href="">Ver Todos
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-chevron-right w-3 h-3">
        <path d="m9 18 6-6-6-6"></path>

        </svg>
      </a>





@for (paciente of pacientes; track $index) {
  <div class="divide-y divide-border">
      <a class="flex items-center gap-4 px-6 py-4 hover:bg-secondary/50 transition-colors" href="">
        <div class="w-10 h-10 rounded-xl bg-primary/10 flex items-center justify-center text-primary font-semibold shrink-0">
          {{paciente.nombre| titlecase}}

        </div>
      </a>
    </div>

  <!-- <p>Paciente: {{paciente.nombre}}</p>
  <p>Fecha de Nacimiento: {{paciente.fechanacimiento | date:"dd-MMMM-yyyy"  }}</p>
  <p>Telefono: {{paciente.telefono}}</p>
  <p>Direccion: {{paciente.direccion}}</p> -->

}
</div>
</div>
</div>
</div>
</main>
